# BASE DE DATOS ? Railway inyecta estas variables de entorno
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool conservador ? plan gratuito Railway tiene límites de conexión
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA ? validate verifica que las tablas existan pero NO las modifica
# En producción NUNCA usar update o create-drop
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# SPRING AI ? Gemini
spring.ai.openai.api-key=${GEMINI_API_KEY}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai
spring.ai.openai.chat.options.model=gemini-2.5-flash

# SERVIDOR ? Railway asigna el PORT dinámicamente via variable de entorno
server.port=${PORT:8080}
server.error.include-message=always

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS ? se actualizará con la URL de Vercel en el Paso 7
cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# Actuator ? health check para Railway
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never